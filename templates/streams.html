<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Data Cloud - Admin Tool</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --green-dark:   #166534;
      --green-main:   #16a34a;
      --green-light:  #bbf7d0;
      --green-bg:     #f0fdf4;
      --green-border: #86efac;
    }
    * { font-family: 'Inter', sans-serif; }
    body { background: #f9fafb; min-height: 100vh; }

    /* ── Navbar ── */
    .navbar {
      background: var(--green-dark) !important;
      box-shadow: 0 2px 8px rgba(0,0,0,.18);
      padding: .75rem 1.5rem;
    }
    .navbar-brand {
      font-weight: 700; font-size: 1.1rem; color: #fff !important;
    }
    .navbar-brand svg { width: 22px; height: 22px; margin-right: 8px; vertical-align: middle; }
    .nav-user  { color: #bbf7d0; font-size: .85rem; }
    .btn-back-nav {
      background: transparent; color: #bbf7d0;
      border: 1.5px solid #4ade80; border-radius: 7px; font-size: .85rem;
      padding: .35rem .85rem; text-decoration: none; transition: all .2s;
    }
    .btn-back-nav:hover { background: rgba(255,255,255,.1); color: #fff; border-color: #fff; }

    /* ── Loading panel ── */
    #loading-panel {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 70vh; gap: 1.5rem;
    }
    .spinner-ring {
      width: 60px; height: 60px;
      border: 5px solid var(--green-border);
      border-top-color: var(--green-main);
      border-radius: 50%;
      animation: spin .85s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-heading { font-weight: 700; font-size: 1.1rem; color: var(--green-dark); }
    .loading-sub     { font-size: .875rem; color: #9ca3af; }
    .step-dots::after {
      content: '';
      animation: dots 1.5s steps(3, end) infinite;
    }
    @keyframes dots {
      0%   { content: ''; }
      33%  { content: '.'; }
      66%  { content: '..'; }
      100% { content: '...'; }
    }
    .progress-steps {
      display: flex; gap: .5rem; align-items: center;
    }
    .step-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green-border);
      transition: background .4s;
    }
    .step-dot.active { background: var(--green-main); }

    /* ── Error panel ── */
    #error-panel {
      display: none;
      max-width: 540px;
      margin: 4rem auto;
      background: #fff;
      border: 1.5px solid #fecaca;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,.07);
    }
    .error-icon-wrap {
      width: 60px; height: 60px;
      background: #fef2f2;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1rem;
    }
    .error-icon-wrap svg { width: 28px; height: 28px; color: #ef4444; }
    .error-title { font-weight: 700; color: #7f1d1d; font-size: 1rem; margin-bottom: .5rem; }
    .error-body  { font-size: .85rem; color: #991b1b; word-break: break-word; }
    .btn-retry {
      background: var(--green-main); color: #fff; border: none;
      border-radius: 8px; padding: .55rem 1.4rem;
      font-weight: 600; font-size: .9rem; text-decoration: none;
      display: inline-block; margin-top: 1.25rem; transition: background .2s;
    }
    .btn-retry:hover { background: var(--green-dark); color: #fff; }

    /* ── Results panel ── */
    #results-panel { display: none; }

    /* ── Stat cards ── */
    .stat-card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 1rem 1.5rem;
      display: flex; align-items: center; gap: 1rem;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }
    .stat-icon {
      width: 44px; height: 44px;
      background: var(--green-bg);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
    }
    .stat-icon svg { width: 22px; height: 22px; color: var(--green-main); }
    .stat-label { font-size: .72rem; color: #6b7280; font-weight: 500; text-transform: uppercase; letter-spacing: .05em; }
    .stat-value { font-size: 1.6rem; font-weight: 700; color: var(--green-dark); line-height: 1.1; }

    /* ── Table card ── */
    .table-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,.07);
      border: 1px solid #e5e7eb;
      overflow: hidden;
    }
    .table-toolbar {
      display: flex; align-items: center; gap: .75rem;
      padding: .9rem 1.1rem;
      border-bottom: 1px solid #f3f4f6;
      flex-wrap: wrap;
    }
    .toolbar-title { font-weight: 600; font-size: .9rem; color: #111827; }
    /* ── Download button ── */
    .btn-excel {
      display: none;               /* shown after data loads */
      align-items: center; gap: .4rem;
      background: #217346; color: #fff;
      border: none; border-radius: 8px;
      padding: .38rem .95rem;
      font-size: .82rem; font-weight: 600;
      cursor: pointer; text-decoration: none;
      transition: background .2s, transform .1s;
      white-space: nowrap;
    }
    .btn-excel:hover  { background: #185c37; color: #fff; }
    .btn-excel:active { transform: scale(.97); }
    .btn-excel svg    { width: 15px; height: 15px; flex-shrink: 0; }

    .search-wrap {
      margin-left: auto; position: relative;
    }
    .search-wrap svg {
      position: absolute; left: .6rem; top: 50%;
      transform: translateY(-50%);
      width: 15px; height: 15px; color: #9ca3af; pointer-events: none;
    }
    .search-wrap input {
      border: 1.5px solid #d1d5db; border-radius: 8px;
      padding: .38rem .75rem .38rem 2rem;
      font-size: .85rem; outline: none;
      transition: border-color .2s; width: 200px;
    }
    .search-wrap input:focus { border-color: var(--green-main); }
    .table-wrapper { overflow-x: auto; max-height: 62vh; overflow-y: auto; }
    .table { margin: 0; font-size: .84rem; }
    .table thead th {
      background: var(--green-dark);
      color: #fff; font-weight: 600;
      font-size: .75rem; text-transform: uppercase; letter-spacing: .05em;
      padding: .72rem 1rem; white-space: nowrap;
      position: sticky; top: 0; z-index: 2; border: none;
    }
    .table tbody td {
      padding: .6rem 1rem; vertical-align: middle; color: #374151;
      border-color: #f3f4f6; white-space: nowrap;
      max-width: 260px; overflow: hidden; text-overflow: ellipsis;
    }
    .table tbody tr:hover td { background: var(--green-bg); }
    .table tbody tr:nth-child(even) td { background: #fafafa; }
    .table tbody tr:nth-child(even):hover td { background: var(--green-bg); }
    .empty-state { padding: 3rem; text-align: center; color: #9ca3af; font-size: .9rem; }
    .row-num { color: #d1d5db; font-size: .78rem; }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
  <div class="container-fluid">
    <span class="navbar-brand">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z"/>
      </svg>
      Data Cloud Analyzer
    </span>
    {% if username %}
    <span class="nav-user me-3 d-none d-md-inline"></span>
    {% endif %}
    <a href="/" class="btn-back-nav ms-auto">&#8592; New Connection</a>
  </div>
</nav>

<!-- ── Loading panel ── -->
<div id="loading-panel">
  <div class="spinner-ring"></div>
  <div class="loading-heading">Fetching</div>
  <div class="loading-sub" id="loading-sub-text">
    Authenticating with Salesforce<span class="step-dots"></span>
  </div>
  <div class="progress-steps" id="progress-dots">
    <div class="step-dot active" id="dot-0"></div>
    <div class="step-dot"        id="dot-1"></div>
    <div class="step-dot"        id="dot-2"></div>
    <div class="step-dot"        id="dot-3"></div>
  </div>
</div>

<!-- ── Error panel ── -->
<div id="error-panel">
  <div class="error-icon-wrap">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
    </svg>
  </div>
  <div class="error-title">Failed to Load Data</div>
  <div class="error-body" id="error-body"></div>
  <a href="/" class="btn-retry">&#8592; Try Again</a>
</div>

<!-- ── Results panel ── -->
<div id="results-panel">
  <div class="container-fluid px-4 py-4">

    <!-- Stat row -->
    <div class="d-flex align-items-center gap-3 mb-4 flex-wrap">

      <div class="stat-card">
        <div class="stat-icon">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4"/>
          </svg>
        </div>
        <div>
          <div class="stat-label">Total Records</div>
          <div class="stat-value" id="stat-count">—</div>
        </div>
      </div>

      <div style="display:flex;flex-direction:column;gap:.4rem;">
        <div style="display:flex;align-items:center;gap:.5rem;">
          <span style="font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#9ca3af;">Action</span>
          <span style="background:var(--green-bg);border:1px solid var(--green-border);color:var(--green-dark);
                       font-size:.75rem;font-weight:600;padding:.18rem .65rem;border-radius:20px;">
            {{ action | replace('_', ' ') | title }}
          </span>
        </div>
        <div style="display:flex;align-items:center;gap:.5rem;">
          <span style="font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#9ca3af;">Object</span>
          <span style="background:#eff6ff;border:1px solid #bfdbfe;color:#1e40af;
                       font-size:.75rem;font-weight:600;padding:.18rem .65rem;border-radius:20px;">
            {{ object_type }}
          </span>
        </div>
      </div>

    </div>

    <!-- Table card -->
    <div class="table-card">
      <div class="table-toolbar">
        <span class="toolbar-title">Results</span>

        <!-- Excel download — visible once data is ready -->
        <a id="btn-excel" class="btn-excel" href="/download/excel" title="Download as Excel (.xlsx)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1
                 m-4-4l-4 4m0 0l-4-4m4 4V4"/>
          </svg>
          Download Excel
        </a>

        <div class="search-wrap">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/>
            <path d="m21 21-4.35-4.35"/>
          </svg>
          <input type="text" id="search-input" placeholder="Search…" oninput="filterTable()"/>
        </div>
      </div>
      <div class="table-wrapper">
        <table class="table table-borderless" id="data-table">
          <thead id="t-head"></thead>
          <tbody id="t-body"></tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // ── Animated loading steps ──────────────────────────────────────────────────
  const steps = [
    "Authenticating with Salesforce",
    "Exchanging Data Cloud token",
    "Querying metadata endpoint",
    "Processing response",
  ];
  let stepIdx = 0;
  const subEl = document.getElementById("loading-sub-text");

  const stepTimer = setInterval(() => {
    stepIdx++;
    if (stepIdx >= steps.length) { clearInterval(stepTimer); return; }
    subEl.innerHTML = steps[stepIdx] + '<span class="step-dots"></span>';
    document.querySelectorAll(".step-dot").forEach((d, i) => {
      d.classList.toggle("active", i <= stepIdx);
    });
  }, 2600);

  // ── Fetch data ──────────────────────────────────────────────────────────────
  let allRows = [];
  let columns = [];

  fetch("/data-streams?format=json")
    .then(res => res.json())
    .then(json => {
      clearInterval(stepTimer);
      hide("loading-panel");

      if (!json.success) { showError(json.error || "Unknown error"); return; }

      const payload = json.data;
      const records =
        (Array.isArray(payload) ? payload : null) ||
        payload?.metadata ||
        payload?.data      ||
        payload?.records   ||
        payload?.dataLakeObjects ||
        payload?.items     ||
        [];

      if (!records.length) {
        showError("No records were returned from the API. Verify your Data Cloud permissions.");
        return;
      }

      columns = [...new Set(records.flatMap(r => Object.keys(r)))];
      allRows  = records;

      // Header
      document.getElementById("t-head").innerHTML =
        "<tr><th>#</th>" + columns.map(c => `<th title="${esc(c)}">${esc(c)}</th>`).join("") + "</tr>";

      renderRows(allRows);
      document.getElementById("stat-count").textContent = records.length.toLocaleString();
      show("results-panel");
      // Reveal download button now that data is available
      const excelBtn = document.getElementById("btn-excel");
      excelBtn.style.display = "flex";
    })
    .catch(err => {
      clearInterval(stepTimer);
      hide("loading-panel");
      showError(err.message || "Network error — could not reach the server.");
    });

  // ── Table rendering ─────────────────────────────────────────────────────────
  function renderRows(rows) {
    const tbody = document.getElementById("t-body");
    if (!rows.length) {
      tbody.innerHTML = `<tr><td colspan="${columns.length + 1}" class="empty-state">No matching records</td></tr>`;
      return;
    }
    tbody.innerHTML = rows.map((row, i) =>
      "<tr><td class='row-num'>" + (i + 1) + "</td>" +
      columns.map(c => {
        const v   = row[c] ?? "";
        const str = typeof v === "object" ? JSON.stringify(v) : String(v);
        return `<td title="${esc(str)}">${esc(str) || "<span style='color:#d1d5db'>—</span>"}</td>`;
      }).join("") +
      "</tr>"
    ).join("");
  }

  function filterTable() {
    const q = document.getElementById("search-input").value.toLowerCase();
    renderRows(q ? allRows.filter(row =>
      columns.some(c => String(row[c] ?? "").toLowerCase().includes(q))
    ) : allRows);
  }

  // ── Helpers ─────────────────────────────────────────────────────────────────
  function showError(msg) {
    document.getElementById("error-body").textContent = msg;
    show("error-panel");
  }
  function show(id) { document.getElementById(id).style.display = "block"; }
  function hide(id) { document.getElementById(id).style.display = "none";  }
  function esc(s) {
    return String(s)
      .replace(/&/g,"&amp;").replace(/</g,"&lt;")
      .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }
</script>
</body>
</html>
