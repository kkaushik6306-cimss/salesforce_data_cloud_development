<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Data 360 — Sign In</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --green-dark:   #166534;
      --green-main:   #16a34a;
      --green-light:  #bbf7d0;
      --green-bg:     #f0fdf4;
      --green-border: #86efac;
    }
    * { font-family: 'Inter', sans-serif; }
    body {
      background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
      min-height: 100vh;
    }

    /* ── Card ── */
    .login-card {
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 8px 40px rgba(22,163,74,.14), 0 2px 10px rgba(0,0,0,.06);
      border: 1px solid var(--green-border);
      padding: 2.75rem 2.25rem 2.25rem;
      width: 100%;
      max-width: 420px;
    }

    /* ── Logo ── */
    .logo-ring {
      width: 68px; height: 68px;
      background: var(--green-bg);
      border: 2px solid var(--green-border);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.1rem;
    }
    .logo-ring svg { width: 34px; height: 34px; color: var(--green-main); }

    .card-title    { color: var(--green-dark); font-weight: 700; font-size: 1.45rem; }
    .card-subtitle { color: #6b7280; font-size: .875rem; }

    /* ── Form ── */
    .form-label {
      font-weight: 600; color: #374151;
      font-size: .875rem; margin-bottom: .3rem;
    }
    .input-wrap { position: relative; }
    .input-icon {
      position: absolute; left: .75rem; top: 50%;
      transform: translateY(-50%);
      width: 17px; height: 17px; color: #9ca3af; pointer-events: none;
    }
    .form-control {
      border: 1.5px solid #d1d5db;
      border-radius: 9px;
      padding: .6rem .85rem .6rem 2.35rem;
      font-size: .9rem;
      transition: border-color .2s, box-shadow .2s;
    }
    .form-control:focus {
      border-color: var(--green-main);
      box-shadow: 0 0 0 3px rgba(22,163,74,.15);
      outline: none;
    }
    /* password toggle */
    .toggle-pw {
      position: absolute; right: .75rem; top: 50%;
      transform: translateY(-50%);
      background: none; border: none; padding: 0;
      color: #9ca3af; cursor: pointer; line-height: 1;
    }
    .toggle-pw:hover { color: var(--green-main); }
    .toggle-pw svg   { width: 17px; height: 17px; }

    /* ── Button ── */
    .btn-signin {
      background: var(--green-main);
      color: #fff; border: none;
      border-radius: 9px;
      padding: .72rem 1.25rem;
      font-weight: 700; font-size: .95rem;
      width: 100%;
      transition: background .2s, transform .1s;
      letter-spacing: .01em;
    }
    .btn-signin:hover  { background: var(--green-dark); color: #fff; }
    .btn-signin:active { transform: scale(.985); }

    /* ── Alerts ── */
    .alert { border-radius: 9px; font-size: .875rem; }
    .alert-danger { background: #fef2f2; border-color: #fecaca; color: #991b1b; }
    .alert-warning{ background: #fffbeb; border-color: #fde68a; color: #92400e; }
    .alert-info   { background: #eff6ff; border-color: #bfdbfe; color: #1e40af; }

    /* ── Footer note ── */
    .footer-note { font-size: .78rem; color: #9ca3af; text-align: center; margin-top: 1.5rem; }
    .version-tag {
      display: inline-block;
      font-size: .68rem; font-weight: 600;
      color: #6b7280;
      background: #f3f4f6;
      border: 1px solid #e5e7eb;
      border-radius: 20px;
      padding: .12rem .5rem;
      margin-left: .35rem;
      letter-spacing: .02em;
      vertical-align: middle;
    }
  </style>
</head>
<body class="d-flex align-items-center justify-content-center py-5">
<div class="login-card">

  <!-- Logo + heading -->
  <div class="text-center mb-4">
    <div class="logo-ring">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999
             5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z"/>
      </svg>
    </div>
    <h1 class="card-title mb-1">Data 360 Admin Tool</h1>
    <p class="card-subtitle">Sign in to access your Salesforce Data 360</p>
  </div>

  <!-- Flash messages -->
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="alert alert-{{ category }} alert-dismissible fade show py-2 mb-3" role="alert">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endwith %}

  <!-- Login form -->
  <form method="POST" action="/login" autocomplete="off" id="login-form">

    <div class="mb-3">
      <label class="form-label" for="username">Username</label>
      <div class="input-wrap">
        <svg class="input-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
        </svg>
        <input type="text" id="username" name="username" class="form-control"
               placeholder="Enter username" required autofocus autocomplete="username"/>
      </div>
    </div>

    <div class="mb-4">
      <label class="form-label" for="password">Password</label>
      <div class="input-wrap">
        <svg class="input-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6
               a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
        </svg>
        <input type="password" id="password" name="password" class="form-control"
               placeholder="Enter password" required autocomplete="current-password"/>
        <button type="button" class="toggle-pw" onclick="togglePassword()" title="Show / hide password">
          <!-- Eye icon (show) -->
          <svg id="eye-show" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M2.458 12C3.732 7.943 7.523 5 12 5
                 c4.478 0 8.268 2.943 9.542 7
                 -1.274 4.057-5.064 7-9.542 7
                 -4.477 0-8.268-2.943-9.542-7z"/>
          </svg>
          <!-- Eye-off icon (hide) — hidden by default -->
          <svg id="eye-hide" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"
               style="display:none;">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M13.875 18.825A10.05 10.05 0 0112 19
                 c-4.478 0-8.268-2.943-9.543-7
                 a9.97 9.97 0 011.563-3.029m5.858.908
                 a3 3 0 114.243 4.243M9.878 9.878
                 l4.242 4.242M9.88 9.88l-3.29-3.29
                 m7.532 7.532l3.29 3.29M3 3l3.59 3.59
                 m0 0A9.953 9.953 0 0112 5
                 c4.478 0 8.268 2.943 9.543 7
                 a10.025 10.025 0 01-4.132 5.411
                 m0 0L21 21"/>
          </svg>
        </button>
      </div>
    </div>

    <button type="submit" class="btn-signin">
      Sign In &rarr;
    </button>
  </form>

  <p class="footer-note">Salesforce Data 360 &bull; Internal Tool <span class="version-tag">v{{ app_version }}</span></p>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  function togglePassword() {
    const input   = document.getElementById("password");
    const eyeShow = document.getElementById("eye-show");
    const eyeHide = document.getElementById("eye-hide");
    const isHidden = input.type === "password";
    input.type       = isHidden ? "text" : "password";
    eyeShow.style.display = isHidden ? "none"  : "";
    eyeHide.style.display = isHidden ? ""      : "none";
  }
</script>
</body>
</html>
